{% extends "base.html" %}
{% block title %}Admin – Conversations{% endblock %}
{% block content %}
<form method="get"><input name="name" value="{{ name }}" placeholder="filter by name"><button>Filter</button></form>
<table class="convos">
  <thead><tr><th>Tech</th><th>Started</th><th>Last active</th><th></th></tr></thead>
  <tbody>
    {% for r in rows %}
    <tr>
      <td>{{ r.tech_name }}</td>
      <td>{{ r.started_at }}</td>
      <td>{{ r.last_active }}</td>
      <td><a href="/admin/conversations/{{ r.id }}">view</a></td>
    </tr>
    {% endfor %}
  </tbody>
</table>
<p><a href="?offset={{ offset + limit }}">next</a></p>
{% endblock %}
